name: Build and Release Electron App

on:
  # 手動でワークフローを実行できるようにする
  workflow_dispatch:
  # v1.0.0 などのタグをプッシュしたときに自動でリリースを作成する
  push:
    tags:
      - 'v*.*.*'

# GITHUB_TOKEN にリリースを作成・更新する権限を付与します
permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Electron App
        run: npm run dist

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        # タグがプッシュされた時、または手動実行時にアップロードします
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          # リリースに追加するファイルのパスを指定します
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.zip
          # 手動実行の場合は draft（下書き）として作成する設定なども可能です（今回は通常のリリースになります）
